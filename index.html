<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ประวัติส่วนตัว - พชรพล จินดา</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Kanit', sans-serif;
            /* พื้นหลังไล่สีสวยๆ */
            background: linear-gradient(135deg, #2b5876 0%, #4e4376 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #333;
        }

        /* กล่องการ์ดโปรไฟล์ */
        .profile-card {
            background-color: #ffffff;
            width: 90%;
            max-width: 420px;
            border-radius: 24px;
            padding: 40px 30px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            transition: transform 0.3s ease;
        }

        .profile-card:hover {
            transform: translateY(-5px); /* เอฟเฟกต์ขยับลอยขึ้นตอนเอาเมาส์ชี้ */
        }

        /* รูปโปรไฟล์ */
        .profile-pic {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #fff;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 600;
            color: #1a1a1a;
            margin-bottom: 5px;
        }

        .subtitle {
            font-size: 1rem;
            color: #666;
            margin-bottom: 25px;
        }

        /* กล่องข้อมูลส่วนตัว */
        .info-box {
            background: #f4f6f8;
            padding: 20px;
            border-radius: 16px;
            text-align: left;
            margin-bottom: 25px;
        }

        .info-item {
            margin-bottom: 12px;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .info-item:last-child {
            margin-bottom: 0;
        }

        .icon {
            font-size: 1.2rem;
            width: 24px;
            text-align: center;
        }

        /* ปุ่มกด GitHub */
        .btn-github {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background-color: #24292e;
            color: #fff;
            text-decoration: none;
            padding: 14px 28px;
            border-radius: 50px; /* ทำให้ปุ่มโค้งมน */
            font-weight: 500;
            font-size: 1rem;
            width: 100%;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .btn-github:hover {
            background-color: #000;
            transform: scale(1.02); /* ปุ่มขยายขึ้นนิดนึงตอนชี้ */
            box-shadow: 0 6px 20px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

    <div class="profile-card">
        <img src="profile" alt="รูปโปรไฟล์" class="profile-pic">
        
        <h1>พชรพล จินดา</h1>
        <p class="subtitle">นักศึกษาวิศวกรรมแมคคาทรอนิกส์</p>
        
        <div class="info-box">
            <div class="info-item">
                <span class="icon">🎂</span>
                <span><strong>วันเกิด:</strong> 23 สิงหาคม 2547</span>
            </div>
            <div class="info-item">
                <span class="icon">🎓</span>
                <span><strong>รหัสนักศึกษา:</strong> 6603014622056</span>
            </div>
            <div class="info-item">
                <span class="icon">⚙️</span>
                <span><strong>ความถนัด:</strong> ระบบ Automation, PLC, Arduino, ESP32</span>
            </div>
        </div>

        <a href="https://github.com/phatcharapoljinda-rgb" target="_blank" class="btn-github">
            <i class="fab fa-github"></i> เข้าสู่ GitHub ของฉัน
        </a>
    </div>

</body>
</html>
