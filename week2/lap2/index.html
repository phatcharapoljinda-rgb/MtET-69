<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab 2: ESP32 Output Control</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #1a1a2e; color: #fff; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: #16213e; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center; width: 350px; }
        .pin-status { font-size: 3rem; margin: 20px 0; font-weight: 600; }
        .btn-container { display: flex; justify-content: center; gap: 15px; }
        .btn { border: none; padding: 15px 25px; border-radius: 10px; cursor: pointer; font-size: 1rem; font-weight: 600; color: #fff; transition: 0.3s; width: 100px; }
        .btn-on { background: #0f3460; border: 2px solid #4ecca3; }
        .btn-on:hover { background: #4ecca3; }
        .btn-off { background: #0f3460; border: 2px solid #e94560; }
        .btn-off:hover { background: #e94560; }
        .back-link { margin-top: 30px; display: block; color: #aaa; text-decoration: none; font-size: 0.9rem; }
    </style>
</head>
<body>

<div class="card">
    <h3>ควบคุม Pin 1</h3>
    <div class="pin-status" id="status">OFF</div>
    
    <div class="btn-container">
        <button class="btn btn-on" onclick="sendCmd('on')">ON</button>
        <button class="btn btn-off" onclick="sendCmd('off')">OFF</button>
    </div>

    <a href="../../index.html" class="back-link">⬅ กลับไปหน้าสารบัญ</a>
</div>

<script>
    function sendCmd(state) {
        document.getElementById('status').innerText = state.toUpperCase();
        document.getElementById('status').style.color = (state === 'on') ? '#4ecca3' : '#e94560';
        
        // ตรงนี้คือคำสั่งส่งไปที่ ESP32
        fetch('/' + state); 
    }
</script>
</body>
</html>
